# ============================================================================
# CampusGen AI - Master Configuration File
# All scripts reference this file - NO HARDCODING ALLOWED
# ============================================================================

project:
  name: "CampusGen AI"
  version: "1.0.0"
  creator: "M Runeet Kumar"
  location: "Ashta/Indore, MP, India"
  start_date: "2026-02-13"
  seed: 42 # Master random seed for reproducibility

# ============================================================================
# HARDWARE CONFIGURATION
# ============================================================================
hardware:
  gpu:
    name: "RTX 5070 Ti"
    vram_gb: 12
    cuda_version: "13.1"
    compute_capability: "12.0" # SM120 (Blackwell)
  system:
    ram_gb: 32
    cpu_cores: 24
    storage_gb: 500

# ============================================================================
# DIRECTORY STRUCTURE
# ============================================================================
paths:
  root: "."
  data:
    root: "data"
    raw: "data/raw"
    processed: "data/processed"
    curated: "data/curated"
    train: "data/train"
    val: "data/val"
    test: "data/test"
    tuning: "data/tuning"
    images: "data/images"
    videos: "data/videos"
    audio: "data/audio"
  models:
    root: "models"
    llama:
      base: "models/llama/base"
      lora: "models/llama/lora"
      merged: "models/llama/merged"
      checkpoints: "models/llama/checkpoints"
    sdxl:
      base: "models/sdxl/base"
      lora: "models/sdxl/lora"
      checkpoints: "models/sdxl/checkpoints"
    cogvideo:
      base: "models/cogvideo/base"
      lora: "models/cogvideo/lora"
    voice:
      base: "models/voice"
  outputs:
    root: "outputs"
    images: "outputs/images"
    videos: "outputs/videos"
    combined: "outputs/combined"
    gallery: "outputs/gallery"
    webapp: "outputs/webapp"
    test: "outputs/test"
  logs:
    root: "logs"
    training: "logs/training"
    inference: "logs/inference"
    tensorboard: "logs/tensorboard"
  configs:
    root: "configs"

# ============================================================================
# MODEL CONFIGURATIONS
# ============================================================================
models:
  llama:
    # Model source
    repo_id: "unsloth/Meta-Llama-3.1-70B-Instruct-bnb-4bit"

    # Model parameters
    max_seq_length: 2048
    context_length: 8192
    dtype: "bfloat16"
    load_in_4bit: true
    load_in_8bit: false

    # Flash attention
    use_flash_attention: true
    attn_implementation: "flash_attention_2"

    # Memory optimization
    gradient_checkpointing: true
    use_cache: false

    # Inference parameters
    temperature: 0.7
    top_p: 0.9
    top_k: 50
    repetition_penalty: 1.1
    max_new_tokens: 256
    do_sample: true

  sdxl:
    # Model source
    repo_id: "stabilityai/stable-diffusion-xl-base-1.0"

    # Model parameters
    dtype: "bfloat16"
    variant: "fp16" # or "fp32"

    # Generation parameters
    height: 1024
    width: 1024
    num_inference_steps: 28
    guidance_scale: 5.0
    num_images_per_prompt: 1

    # Memory optimization
    enable_cpu_offload: false
    enable_attention_slicing: false
    enable_vae_slicing: false
    enable_vae_tiling: false

  cogvideo:
    repo_id: "THUDM/CogVideoX-5b"
    enabled: false
    num_frames: 49
    fps: 8
    guidance_scale: 6.0
    num_inference_steps: 50

  voice:
    repo_id: "fishaudio/fish-speech-1.5"
    enabled: false
    language: "hindi-english-mix"
    speed: 1.0
    pitch: 0

# ============================================================================
# DATASET CONFIGURATION
# ============================================================================
dataset:
  # Data splits
  splits:
    train: 0.8
    val: 0.1
    test: 0.1

  # Target samples
  target_samples: 1000
  min_samples: 100
  max_samples: 10000

  # Image specifications
  image:
    size: [1024, 1024]
    format: "PNG"
    quality: 95
    channels: 3

  # Quality thresholds
  quality:
    min_score: 0.7
    min_clip_score: 0.25
    max_toxicity: 0.3

  # Stratification
  stratify_by: "category"
  balance_classes: true

  # Categories
  categories:
    - "diwali"
    - "holi"
    - "navratri"
    - "eid"
    - "ganesh"
    - "tech_fest"
    - "cultural_fest"
    - "sports"
    - "workshop"
    - "general"

  # Prompt generation
  prompts:
    cities:
      - "Indore"
      - "Mumbai"
      - "Delhi"
      - "Bangalore"
      - "Hyderabad"
      - "Pune"
      - "Chennai"
      - "Kolkata"
      - "Ahmedabad"
      - "Jaipur"
    colleges:
      - "IIT"
      - "NIT"
      - "IIIT"
      - "Engineering College"
      - "University"
      - "Technical Institute"
    states:
      - "Madhya Pradesh"
      - "Maharashtra"
      - "Karnataka"
      - "Tamil Nadu"
      - "Gujarat"

